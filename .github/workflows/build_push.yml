name: CI build

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

  build:
    name: Build Jar
    needs: check_wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          path: master
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5 # تحديث للنسخة 5 لمطابقة الرسمي
        with:
          java-version: 25
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Jar
        env:
          ProductBuildType: "Preview"
          _JAVA_OPTIONS: "-Xmx4g"
        working-directory: master
        run: ./gradlew :server:shadowJar --stacktrace -Dorg.gradle.jvmargs="-Xmx4g" -Dkotlin.daemon.jvmargs="-Xmx4g"
      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: master/server/build/*.jar
      - name: Upload icons
        uses: actions/upload-artifact@v4
        with:
          name: icon
          path: master/server/src/main/resources/icon
      - name: Tar scripts
        run: tar -cvzf scripts.tar.gz -C master/ scripts/
      - name: Upload scripts
        uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: scripts.tar.gz

  jlink:
    runs-on: windows-latest
    name: Jlink Windows
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v5 # تحديث للنسخة 5 لمطابقة الرسمي
        with:
          java-version: 25
          distribution: 'zulu'
      - name: Package JDK
        # السطر أدناه أضفت له jdk.zipfs لحل مشكلة الانهيار عند التشغيل
        run: jlink --add-modules java.base,java.compiler,java.desktop,java.logging,java.management,java.naming,java.security.jgss,java.sql,java.xml,jdk.attach,jdk.unsupported,jdk.zipfs --output suwa --strip-debug --no-man-pages --no-header-files --compress=2
      - name: Upload JRE package
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-jre
          path: suwa

  bundle_windows:
    name: Create Windows MSI
    needs: [build, jlink]
    runs-on: ubuntu-latest
    steps:
      - name: Download Jar
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: server/build
      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-jre
          path: jre
      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: icon
          path: server/src/main/resources/icon
      - name: Download scripts
        uses: actions/download-artifact@v4
        with:
          name: scripts
      - name: Bundle MSI
        run: |
          mkdir upload
          tar -xvpf scripts.tar.gz
          chmod +x scripts/bundler.sh
          ./scripts/bundler.sh -o upload/ windows-x64
      - name: Upload MSI Result
        uses: actions/upload-artifact@v4
        with:
          name: Suwayomi-Windows-MSI
          path: upload/*
